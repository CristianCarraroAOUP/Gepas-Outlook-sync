name: GEPAS → Genera calendario ICS

on:
  schedule:
    - cron: "0 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  genera-ics:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4.2.2

      - name: Imposta Python
        uses: actions/setup-python@v5.6.0
        with:
          python-version: "3.11"

      - name: Installa dipendenze
        run: |
          pip install playwright requests
          playwright install chromium
          playwright install-deps chromium

      - name: Esegui scraper e genera ICS
        run: python scraper.py

      - name: Pubblica file su GitHub Pages
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/scioperi.ics docs/debug_screenshot.png docs/debug_page.html || true
          git diff --cached --quiet || git commit -m "Aggiorna scioperi.ics - $(date +'%Y-%m-%d')"
          git push
